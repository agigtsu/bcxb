; Supervisor configuration: manages cloudflared + SOCKS5 server

[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
loglevel=info
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

; ═══════════════════════════════════════════════════════════════════════════
; SOCKS5 Python Server
; ═══════════════════════════════════════════════════════════════════════════
[program:socks5_server]
command=python3 /app/socks5_server.py
autorestart=true
startsecs=5
stopasgroup=true
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=SOCKS_HOST=0.0.0.0,SOCKS_PORT=8888,LOG_LEVEL=info

; ═══════════════════════════════════════════════════════════════════════════
; Cloudflare Tunnel (routes through tunnel to SOCKS5 server)
; ═══════════════════════════════════════════════════════════════════════════
[program:cloudflared_tunnel]
command=cloudflared tunnel run --token %(ENV_CLOUDFLARE_TUNNEL_TOKEN)s
autorestart=true
startsecs=5
stopasgroup=true
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[group:socks5_tunnel]
programs=socks5_server,cloudflared_tunnel
priority=999